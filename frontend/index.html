<!doctype html>
<html lang="es" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO: título y descripción -->
    <title>FocusFlow — Tu GPS cognitivo personal</title>
    <meta name="description" content="FocusFlow convierte objetivos ambiguos en pasos concretos y ejecutables. Diseñado para personas con TDAH, ansiedad y dificultades para iniciar tareas." />
    <meta name="theme-color" content="#4F6EF7" />

    <!-- PWA meta tags para iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FocusFlow" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />

    <!-- Open Graph para compartir en redes -->
    <meta property="og:title" content="FocusFlow — Tu GPS cognitivo personal" />
    <meta property="og:description" content="Convertí cualquier objetivo en pasos pequeños y claros. Un paso a la vez, sin apuro." />
    <meta property="og:type" content="website" />

    <!-- Favicon mínimo (se puede reemplazar con SVG real) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Preconectar a Google Fonts para cargar más rápido -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <!-- Nodo raíz donde React monta la aplicación -->
    <div id="root"></div>

    <!-- Punto de entrada de Vite -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
